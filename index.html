let _messaging=null;
function getMessaging(){
  try{
    if(!_messaging && firebase.messaging && firebase.messaging.isSupported && firebase.messaging.isSupported()){
      _messaging = firebase.messaging();
    }
  }catch(e){console.warn("Messaging init failed:",e);}
  return _messaging;
}
async function setupPushForDevice(person, syncCode){
  if(!('serviceWorker' in navigator)) throw new Error("Service workers not supported on this browser");
  if(!firebase.messaging || !firebase.messaging.isSupported || !firebase.messaging.isSupported()) throw new Error("Push not supported here. On iPhone, the app must be installed to your home screen first.");
  const permission = await Notification.requestPermission();
  if(permission !== "granted") throw new Error("Notifications were denied. Re-enable in Settings → Notifications → Lilianfeld.");
  const reg = await navigator.serviceWorker.register('./firebase-messaging-sw.js');
  await navigator.serviceWorker.ready;
  const m = getMessaging();
  const token = await m.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: reg });
  if(!token) throw new Error("Couldn't generate a push token. Try again.");
  await db.collection("devices").doc(token).set({
    person, syncCode: syncCode || "",
    lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
    userAgent: navigator.userAgent
  });
  return token;
}

  const seg=()=>Array.from({length:4},()=>chars[Math.floor(Math.random()*chars.length)]).join("");
  return `lf-${seg()}-${seg()}-${seg()}`;

/* ---------- Helpers ---------- */
function effectiveTasks(d, overrides, deleted, custom){
  const built = d.tasks.map((t,i)=>{
    const key=`${d.day}-${i}`;
    if(deleted[key]) return null;
    return {key, text: overrides[key]||t, builtin:true, index:i};
  }).filter(Boolean);
  const cust = (custom[d.day]||[]).map(t=>({
    key:`${d.day}-c${t.id}`, text:t.text, builtin:false, customId:t.id
  }));
  return [...built, ...cust];
}
function otherEffectiveTasks(otherTasks){
  return (otherTasks||[]).map(t=>({
    key: `other-c${t.id}`, text: t.text, builtin: false, customId: t.id
  }));
}
function dayCounts(d, checked, overrides, deleted, custom){
  const tasks = effectiveTasks(d, overrides, deleted, custom);
  const done = tasks.filter(t=>checked[t.key]).length;
  return {done, total:tasks.length, tasks};
}
function otherCounts(otherTasks, checked){
  const tasks = otherEffectiveTasks(otherTasks);
  const done = tasks.filter(t=>checked[t.key]).length;
  return {done, total: tasks.length, tasks};
}

function sharePersonTasks(theme, grouped, otherAssigned, checked){
  // Collect only pending (not-done) tasks — flat list, no day labels
  const pending = [];
  grouped.forEach(g=>{
    g.tasks.forEach(t=>{
      if(!checked[t.key]) pending.push(t.text);
    });
  });
  otherAssigned.forEach(t=>{
    if(!checked[t.key]) pending.push(t.text);
  });

  const text = pending.length === 0
    ? `${theme.name}'s tasks:\n\nAll done 🎉`
    : `${theme.name}'s tasks:\n\n` + pending.map(t=>`• ${t}`).join("\n");

  if(navigator.share){
    navigator.share({title:`${theme.name}'s tasks`, text}).catch(()=>{});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>alert("Copied to clipboard")).catch(()=>prompt("Copy this:",text));
  } else {
    prompt("Copy this:",text);
  }
}

/* ---------- Gesture hooks ---------- */
// Edge-swipe-back: swipe right from left edge to go back. Page slides with finger.
// Listens on document so edge touches register even when the wrapper has padding.
// Listeners attach ONCE per enabled cycle (not on every callback change) so a
// mid-swipe state-change re-render doesn't strand the gesture.
function useEdgeSwipeBack(onBack, enabled){
  const ref = useRef(null);
  const onBackRef = useRef(onBack);
  useEffect(()=>{ onBackRef.current = onBack; }, [onBack]);

  useEffect(()=>{
    if(!enabled) return;
    let startX=0, startY=0, dragging=false, deltaX=0, startTime=0;
    const EDGE = 44; // generous edge zone for thumb reach
    const getEl = ()=>ref.current;
    let pendingTimer = null;

    const resetEl = (transition)=>{
      const el = getEl(); if(!el) return;
      el.style.transition = transition || 'none';
      el.style.transform = 'translateX(0)';
    };

    const onStart = (e)=>{
      const t = e.touches[0];
      if(t.clientX > EDGE) return;
      const el = getEl();
      if(!el) return;
      // Note: do NOT check el.contains(e.target) — the body has padding,
      // so edge touches land on the parent, not the wrapper. We rely on
      // the `enabled` flag (passed from App) to gate the gesture when
      // sheets / modals are open.
      if(pendingTimer){ clearTimeout(pendingTimer); pendingTimer = null; }
      startX = t.clientX; startY = t.clientY;
      dragging = true; deltaX = 0; startTime = Date.now();
      el.style.transition = 'none';
    };
    const onMove = (e)=>{
      if(!dragging) return;
      const el = getEl();
      if(!el){ dragging = false; return; }
      const t = e.touches[0];
      const dx = t.clientX - startX;
      const dy = t.clientY - startY;
      if(Math.abs(dy) > Math.abs(dx) + 12){
        dragging = false;
        el.style.transition = 'transform 0.18s ease-out';
        el.style.transform = 'translateX(0)';
        return;
      }
      if(dx < 0){ deltaX = 0; el.style.transform = 'translateX(0px)'; return; }
      deltaX = dx;
      el.style.transform = `translateX(${dx}px)`;
    };
    const onEnd = ()=>{
      if(!dragging) return;
      dragging = false;
      const el = getEl();
      if(!el) return;
      const elapsed = Date.now() - startTime;
      const velocity = deltaX / Math.max(elapsed, 1);
      const shouldCommit = deltaX > window.innerWidth * 0.25 || (velocity > 0.4 && deltaX > 30);
      el.style.transition = 'transform 0.22s cubic-bezier(0.22, 1, 0.36, 1)';
      if(shouldCommit){
        el.style.transform = `translateX(${window.innerWidth}px)`;
        pendingTimer = setTimeout(()=>{
          pendingTimer = null;
          onBackRef.current();
        }, 180);
      } else {
        el.style.transform = 'translateX(0)';
      }
    };

    document.addEventListener('touchstart', onStart, {passive: true});
    document.addEventListener('touchmove', onMove, {passive: true});
    document.addEventListener('touchend', onEnd);
    document.addEventListener('touchcancel', onEnd);
    return ()=>{
      if(pendingTimer){ clearTimeout(pendingTimer); pendingTimer = null; }
      resetEl(); // ensure no stuck transform when listeners detach
      document.removeEventListener('touchstart', onStart);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onEnd);
      document.removeEventListener('touchcancel', onEnd);
    };
  }, [enabled]); // deliberately exclude onBack — read via ref instead
  return ref;
}

// Swipe-down on a sheet's drag handle area to dismiss.
// Velocity-aware: a quick flick dismisses even at short distance.
function useSwipeDownDismiss(onClose){
  const sheetRef = useRef(null);
  const handleRef = useRef(null);
  const onCloseRef = useRef(onClose);
  useEffect(()=>{ onCloseRef.current = onClose; }, [onClose]);

  useEffect(()=>{
    const sheet = sheetRef.current;
    const handle = handleRef.current;
    if(!sheet || !handle) return;
    let startY=0, startX=0, dragging=false, deltaY=0, startTime=0;
    let pendingTimer = null;

    const onStart = (e)=>{
      const t = e.touches[0];
      if(pendingTimer){ clearTimeout(pendingTimer); pendingTimer = null; }
      startY = t.clientY; startX = t.clientX;
      dragging = true; deltaY = 0; startTime = Date.now();
      sheet.style.transition = 'none';
    };
    const onMove = (e)=>{
      if(!dragging) return;
      const t = e.touches[0];
      const dy = t.clientY - startY;
      const dx = t.clientX - startX;
      if(Math.abs(dx) > Math.abs(dy) + 14){
        dragging = false;
        sheet.style.transition = 'transform 0.18s ease-out';
        sheet.style.transform = 'translateY(0)';
        return;
      }
      if(dy < 0){ deltaY = 0; sheet.style.transform = 'translateY(0)'; return; }
      deltaY = dy;
      sheet.style.transform = `translateY(${dy}px)`;
    };
    const onEnd = ()=>{
      if(!dragging) return;
      dragging = false;
      const elapsed = Date.now() - startTime;
      const velocity = deltaY / Math.max(elapsed, 1);
      const distanceThreshold = Math.min(sheet.offsetHeight * 0.22, 100);
      const shouldDismiss = deltaY > distanceThreshold || (velocity > 0.5 && deltaY > 30);
      sheet.style.transition = 'transform 0.22s cubic-bezier(0.22, 1, 0.36, 1)';
      if(shouldDismiss){
        sheet.style.transform = `translateY(${sheet.offsetHeight}px)`;
        pendingTimer = setTimeout(()=>{
          pendingTimer = null;
          onCloseRef.current();
        }, 180);
      } else {
        sheet.style.transform = 'translateY(0)';
      }
    };

    handle.addEventListener('touchstart', onStart, {passive: true});
    handle.addEventListener('touchmove', onMove, {passive: true});
    handle.addEventListener('touchend', onEnd);
    handle.addEventListener('touchcancel', onEnd);
    return ()=>{
      if(pendingTimer){ clearTimeout(pendingTimer); pendingTimer = null; }
      handle.removeEventListener('touchstart', onStart);
      handle.removeEventListener('touchmove', onMove);
      handle.removeEventListener('touchend', onEnd);
      handle.removeEventListener('touchcancel', onEnd);
    };
  }, []); // attach once per sheet; onClose read from ref
  return { sheetRef, handleRef };
}

      if(!e.data || e.data.type!=='deep-link') return;
      if(e.data.other) goToOther();
      else if(e.data.day) goToDay(e.data.day);

  useEffect(()=>{try{localStorage.setItem("lf_assigne_v1",JSON.stringify(assignedE))}catch{}},[assignedE]);
  useEffect(()=>{try{localStorage.setItem("lf_assignc_v1",JSON.stringify(assignedC))}catch{}},[assignedC]);
  useEffect(()=>{try{localStorage.setItem("lf_device_v1",JSON.stringify(device))}catch{}},[device]);

  /* Firestore main sync */
  useEffect(()=>{
    if(!syncCode){setSyncStatus("local");return;}
    setSyncStatus("connecting");
    const unsub = db.collection("sync").doc(syncCode).onSnapshot(
      snap=>{
        setSyncStatus("synced");
        if(snap.exists){
          const d=snap.data();
          const r={
            checked:d.checked||{},notes:d.notes||{},custom:d.custom||{},
            otherTasks:d.otherTasks||[],
            overrides:d.overrides||{},deleted:d.deleted||{},
            assignedE:d.assignedE||{},assignedC:d.assignedC||{}
          };
          remoteRef.current=r;
          setChecked(r.checked);setNotes(r.notes);setCustom(r.custom);setOtherTasks(r.otherTasks);
          setOverrides(r.overrides);setDeleted(r.deleted);
          setAssignedE(r.assignedE);setAssignedC(r.assignedC);
        } else {
          db.collection("sync").doc(syncCode).set({
            checked,notes,custom,otherTasks,overrides,deleted,assignedE,assignedC,
            updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
            schemaVersion:3
          }).then(()=>{remoteRef.current={checked,notes,custom,otherTasks,overrides,deleted,assignedE,assignedC};}).catch(()=>{});
        }
      },
      err=>{console.error("Firestore error:",err);setSyncStatus("error");}
    );
    return unsub;
  },[syncCode]); // eslint-disable-line

  useEffect(()=>{
    if(!syncCode || syncStatus!=="synced") return;
    const r=remoteRef.current;
    const same =
      JSON.stringify(checked)===JSON.stringify(r.checked) &&
      JSON.stringify(notes)===JSON.stringify(r.notes) &&
      JSON.stringify(custom)===JSON.stringify(r.custom) &&
      JSON.stringify(otherTasks)===JSON.stringify(r.otherTasks) &&
      JSON.stringify(overrides)===JSON.stringify(r.overrides) &&
      JSON.stringify(deleted)===JSON.stringify(r.deleted) &&
      JSON.stringify(assignedE)===JSON.stringify(r.assignedE) &&
      JSON.stringify(assignedC)===JSON.stringify(r.assignedC);
    if(same) return;
    const t=setTimeout(()=>{
      db.collection("sync").doc(syncCode).set({
        checked,notes,custom,otherTasks,overrides,deleted,assignedE,assignedC,
        updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
        schemaVersion:3
      }).then(()=>{
        remoteRef.current={checked,notes,custom,otherTasks,overrides,deleted,assignedE,assignedC};
      }).catch(err=>console.error("Sync write failed:",err));
    },600);
    return ()=>clearTimeout(t);
  },[checked,notes,custom,otherTasks,overrides,deleted,assignedE,assignedC,syncCode,syncStatus]);

  /* Refresh device lastSeen */
  useEffect(()=>{
    if(device.token && syncCode){
      db.collection("devices").doc(device.token).set({
        person: device.person, syncCode,
        lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
        userAgent: navigator.userAgent
      }, {merge:true}).catch(()=>{});
    }
  },[device.token, syncCode]); // eslint-disable-line

  /* Foreground message handler */
  useEffect(()=>{
    if(!device.token) return;
    const m = getMessaging();
    if(!m) return;
    try{
      const unsub = m.onMessage(payload=>{
        const title=(payload.notification&&payload.notification.title) || (payload.data&&payload.data.title) || "Ping";
        const body =(payload.notification&&payload.notification.body)  || (payload.data&&payload.data.body)  || "";
        showToast(`📨 ${body || title}`);
      });
      return unsub;
    }catch(e){console.warn(e);}
  },[device.token]);

  /* Actions */
  const toggle=k=>setChecked(p=>({...p,[k]:!p[k]}));
  const saveNote=(day,text)=>setNotes(p=>({...p,[day]:text}));

  const addCustomTask=(day,text)=>{
    const trimmed=(text||"").trim();if(!trimmed)return;
    setCustom(p=>{
      const list=p[day]||[];
      const id=Date.now().toString(36)+Math.random().toString(36).slice(2,5);
      return{...p,[day]:[...list,{id,text:trimmed}]};
    });
  };
  const addOtherTask=(text)=>{
    const trimmed=(text||"").trim();if(!trimmed)return;
    setOtherTasks(p=>{
      const id=Date.now().toString(36)+Math.random().toString(36).slice(2,5);
      return [...p,{id,text:trimmed}];
    });
  };

  const editTask=(task,newText,dayNum)=>{
    const t=(newText||"").trim();if(!t) return;
    if(task.builtin){
      setOverrides(p=>({...p,[task.key]:t}));
    } else if(isOtherKey(task.key)){
      setOtherTasks(p=>p.map(x=>x.id===task.customId?{...x,text:t}:x));
    } else {
      setCustom(p=>{
        const list=(p[dayNum]||[]).map(x=>x.id===task.customId?{...x,text:t}:x);
        return {...p,[dayNum]:list};
      });
    }
  };
  const deleteTask=(task, dayNum)=>{
    if(task.builtin){
      setDeleted(p=>({...p,[task.key]:true}));
    } else if(isOtherKey(task.key)){
      setOtherTasks(p=>p.filter(x=>x.id!==task.customId));
      setChecked(p=>{const n={...p};delete n[task.key];return n;});
    } else {
      setCustom(p=>({...p,[dayNum]:(p[dayNum]||[]).filter(t=>t.id!==task.customId)}));
      setChecked(p=>{const n={...p};delete n[task.key];return n;});
    }
    setAssignedE(p=>{const n={...p};delete n[task.key];return n;});
    setAssignedC(p=>{const n={...p};delete n[task.key];return n;});
  };
  const restoreDeletedForDay=dayNum=>{
    setDeleted(p=>{const n={...p};Object.keys(n).forEach(k=>{if(k.startsWith(`${dayNum}-`)) delete n[k];});return n;});
  };
  const toggleAssignE=k=>setAssignedE(p=>{const n={...p};if(n[k])delete n[k];else n[k]=true;return n;});
  const toggleAssignC=k=>setAssignedC(p=>{const n={...p};if(n[k])delete n[k];else n[k]=true;return n;});

  /* Ping */
  const sendPing = async (taskObj, dayObj) => {
    if(!syncCode){alert("Enable Sync first (bottom of main screen) so the other device can receive pings.");return;}
    const targets = assignedPersons(taskObj.key, assignedE, assignedC);
    if(targets.length === 0){alert("Assign this task to Edward or Clarissa first — then you can ping them.");return;}
    const isOther = isOtherKey(taskObj.key);
    try{
      await db.collection("pings").add({
        syncCode,
        taskKey: taskObj.key,
        dayNum: isOther ? null : (dayObj?.day || null),
        taskText: taskObj.text,
        dayTitle: isOther ? "Other Tasks" : (dayObj?.title || ""),
        isOther: !!isOther,
        targetPersons: targets,
        senderPerson: device.person || "",
        senderDevice: device.token || "",
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showToast(`📨 Pinged ${namesFor(targets)}`);
    }catch(err){console.error(err);alert("Couldn't send ping. Check your connection.");}
  };

  /* Device setup */
  const completeDeviceSetup=async(person)=>{
    setPushBusy(true);
    try{
      const token=await setupPushForDevice(person, syncCode);
      setDevice({person, token});
      setShowDeviceSetup(false);
      showToast("Notifications enabled");
    }catch(err){alert("Couldn't enable notifications: "+(err.message||err));}
    finally{setPushBusy(false);}
  };

  /* Sync */
  const activateSync = async (code) => {
    const c=(code||"").trim();
    if(c.length<6){alert("Code must be at least 6 characters.");return;}
    try{
      setSyncStatus("connecting");
      const snap = await db.collection("sync").doc(c).get();
      const hasLocal = Object.keys(checked).length+Object.keys(notes).length+Object.keys(custom).length+otherTasks.length+Object.keys(overrides).length+Object.keys(deleted).length>0;
      if(snap.exists){
        const d=snap.data();
        const remoteHas = Object.keys(d.checked||{}).length+Object.keys(d.notes||{}).length+Object.keys(d.custom||{}).length+(d.otherTasks||[]).length+Object.keys(d.overrides||{}).length+Object.keys(d.deleted||{}).length>0;
        if(remoteHas && hasLocal){
          if(!confirm("This code has existing data. Replace your local progress with the synced data?")){setSyncStatus(syncCode?"synced":"local");return;}
        }
        if(remoteHas){
          setChecked(d.checked||{});setNotes(d.notes||{});setCustom(d.custom||{});
          setOtherTasks(d.otherTasks||[]);
          setOverrides(d.overrides||{});setDeleted(d.deleted||{});
          setAssignedE(d.assignedE||{});setAssignedC(d.assignedC||{});
          remoteRef.current={checked:d.checked||{},notes:d.notes||{},custom:d.custom||{},otherTasks:d.otherTasks||[],overrides:d.overrides||{},deleted:d.deleted||{},assignedE:d.assignedE||{},assignedC:d.assignedC||{}};
        } else {
          await db.collection("sync").doc(c).set({checked,notes,custom,otherTasks,overrides,deleted,assignedE,assignedC,updatedAt:firebase.firestore.FieldValue.serverTimestamp(),schemaVersion:3});
          remoteRef.current={checked,notes,custom,otherTasks,overrides,deleted,assignedE,assignedC};
        }
      } else {
        await db.collection("sync").doc(c).set({checked,notes,custom,otherTasks,overrides,deleted,assignedE,assignedC,updatedAt:firebase.firestore.FieldValue.serverTimestamp(),schemaVersion:3});
        remoteRef.current={checked,notes,custom,otherTasks,overrides,deleted,assignedE,assignedC};
      }
      try{localStorage.setItem("lf_sync_code",c)}catch{};
      setSyncCode(c);setSyncStatus("synced");setSyncOpen(false);showToast("Sync enabled");
    } catch(err){console.error(err);alert("Couldn't connect.");setSyncStatus(syncCode?"synced":"local");}
  };
  const disconnectSync = ()=>{
    if(!confirm("Stop syncing? Your local data stays on this device.")) return;
    try{localStorage.removeItem("lf_sync_code")}catch{};
    setSyncCode(null);setSyncStatus("local");setSyncOpen(false);showToast("Sync disabled");
  };

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2200);};

  /* Counts (plan only — Other Tasks excluded from overall %) */
  const totals=DAYS.reduce((a,d)=>{const c=dayCounts(d,checked,overrides,deleted,custom);return{done:a.done+c.done,total:a.total+c.total};},{done:0,total:0});
  const pct=totals.total?Math.round(totals.done/totals.total*100):0;
  const W=WEEKS[week];
  const weekDays=DAYS.filter(d=>d.week===week);
  // Pending count = unchecked tasks (plan + other) assigned to that person
  const pendingECount =
    DAYS.reduce((a,d)=>a+effectiveTasks(d,overrides,deleted,custom).filter(t=>assignedE[t.key] && !checked[t.key]).length,0) +
    otherEffectiveTasks(otherTasks).filter(t=>assignedE[t.key] && !checked[t.key]).length;
  const pendingCCount =
    DAYS.reduce((a,d)=>a+effectiveTasks(d,overrides,deleted,custom).filter(t=>assignedC[t.key] && !checked[t.key]).length,0) +
    otherEffectiveTasks(otherTasks).filter(t=>assignedC[t.key] && !checked[t.key]).length;
  const otherC = otherCounts(otherTasks, checked);

  const s={
    wrap:{fontFamily:"-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif",background:"#F2F2F7",minHeight:"100vh",maxWidth:430,margin:"0 auto",paddingBottom:80},
    hdr:{background:"rgba(242,242,247,0.92)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",padding:"env(safe-area-inset-top,44px) 20px 14px",position:"sticky",top:0,zIndex:10,borderBottom:"1px solid rgba(0,0,0,0.08)"},
    body:{padding:"16px 16px 0"},
  };

  const headerTitle = activeDay
    ? `Day ${activeDay.day}`
    : (activeOther ? "Other Tasks" : "30-Day Plan");
  const headerAccent = activeOther ? OTHER_ACCENT : W.accent;

  const handleSwipeBack = useCallback(()=>{
    if(activeDay) setActiveDay(null);
    else if(activeOther) setActiveOther(false);
  },[activeDay, activeOther]);
  const anySheetOpen = !!menuTask || !!personView || syncOpen || showDeviceSetup;
  const pageRef = useEdgeSwipeBack(handleSwipeBack, !!(activeDay || activeOther) && !anySheetOpen);

  return(
    <div style={s.wrap}>
      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"#1C1C1E",color:"#fff",fontSize:13,fontWeight:500,padding:"9px 18px",borderRadius:99,zIndex:1100,boxShadow:"0 4px 20px rgba(0,0,0,0.3)",whiteSpace:"nowrap",maxWidth:"90%",overflow:"hidden",textOverflow:"ellipsis"}}>{toast}</div>}
      <div style={s.hdr}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:11,fontWeight:600,color:"#8E8E93",letterSpacing:0.5,textTransform:"uppercase",marginBottom:2}}>Lilianfeld Candles</div>
            <div style={{fontSize:22,fontWeight:700,color:"#1C1C1E",letterSpacing:-0.5}}>{headerTitle}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:26,fontWeight:700,color:"#1C1C1E",letterSpacing:-0.5}}>{pct}<span style={{fontSize:14,color:"#8E8E93",fontWeight:500}}>%</span></div>
            <div style={{fontSize:11,color:"#8E8E93"}}>{totals.done}/{totals.total} done</div>
          </div>
        </div>
        <div style={{marginTop:10,height:4,background:"#D1D1D6",borderRadius:99,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pct}%`,background:headerAccent,borderRadius:99,transition:"width 0.4s"}}/>
        </div>
      </div>
      <div style={s.body}>
        {(activeDay || activeOther) ? (
          <div ref={pageRef} key={activeOther ? "other" : `day-${activeDay.day}`} style={{willChange:"transform",transform:"translateX(0)",background:"#F2F2F7",boxShadow:"-3px 0 18px rgba(0,0,0,0.08)",borderRadius:"0",minHeight:"calc(100vh - 200px)"}}>
            {activeDay
              ? <DayDetail
                  d={activeDay}
                  checked={checked} custom={custom}
                  overrides={overrides} deleted={deleted}
                  assignedE={assignedE} assignedC={assignedC}
                  note={notes[activeDay.day]||""}
                  editingKey={editingKey}
                  onToggle={toggle}
                  onPing={sendPing}
                  onLongPress={(taskObj)=>setMenuTask({dayObj:activeDay, taskObj})}
                  onAddCustom={text=>addCustomTask(activeDay.day,text)}
                  onNoteChange={text=>saveNote(activeDay.day,text)}
                  onEditSave={(taskObj,text)=>{editTask(taskObj,text,activeDay.day);setEditingKey(null);}}
                  onEditCancel={()=>setEditingKey(null)}
                  onRestoreDeleted={()=>restoreDeletedForDay(activeDay.day)}
                  onBack={()=>setActiveDay(null)}/>
              : <OtherTasksDetail
                  tasks={otherEffectiveTasks(otherTasks)}
                  checked={checked}
                  assignedE={assignedE} assignedC={assignedC}
                  editingKey={editingKey}
                  onToggle={toggle}
                  onPing={sendPing}
                  onLongPress={(taskObj)=>setMenuTask({dayObj:null, taskObj, isOther:true})}
                  onAdd={addOtherTask}
                  onEditSave={(taskObj,text)=>{editTask(taskObj,text);setEditingKey(null);}}
                  onEditCancel={()=>setEditingKey(null)}
                  onBack={()=>setActiveOther(false)}/>}
          </div>
        ) : <>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              {WEEKS.map((wk,i)=>{
                const wDs=DAYS.filter(d=>d.week===i);
                const tot=wDs.reduce((a,d)=>{const c=dayCounts(d,checked,overrides,deleted,custom);return{d:a.d+c.done,t:a.t+c.total};},{d:0,t:0});
                const act=week===i;
                return(
                  <button key={i} onClick={()=>setWeek(i)} style={{border:"none",borderRadius:16,padding:"14px 14px",cursor:"pointer",textAlign:"left",background:act?wk.accent:"#fff",boxShadow:act?`0 4px 16px ${wk.accent}50`:"0 1px 4px rgba(0,0,0,0.08)",transform:act?"scale(1.02)":"scale(1)",transition:"all 0.2s"}}>
                    <div style={{fontSize:11,fontWeight:700,color:act?"rgba(255,255,255,0.7)":"#8E8E93",textTransform:"uppercase",letterSpacing:0.4}}>{wk.label}</div>
                    <div style={{fontSize:14,fontWeight:600,color:act?"#fff":"#1C1C1E",marginTop:3,lineHeight:1.3}}>{wk.subtitle}</div>
                    <div style={{marginTop:10,height:3,background:act?"rgba(255,255,255,0.3)":"#E5E5EA",borderRadius:99,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${tot.t?Math.round(tot.d/tot.t*100):0}%`,background:act?"#fff":wk.accent,borderRadius:99}}/>
                    </div>
                    <div style={{fontSize:11,color:act?"rgba(255,255,255,0.65)":"#8E8E93",marginTop:5}}>{tot.d}/{tot.t} tasks</div>
                  </button>
                );
              })}
            </div>

            {/* Other Tasks card */}
            <button onClick={()=>setActiveOther(true)} style={{width:"100%",background:"#fff",border:"none",borderRadius:16,padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,0.08)",textAlign:"left"}}>
              <div style={{width:32,height:32,borderRadius:"50%",background:`${OTHER_ACCENT}18`,color:OTHER_ACCENT,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:14,fontWeight:700}}>+</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,fontWeight:700,color:"#8E8E93",letterSpacing:0.4,textTransform:"uppercase",marginBottom:2}}>Other Tasks</div>
                <div style={{fontSize:13,fontWeight:600,color:"#1C1C1E"}}>{otherC.total===0?"Nothing yet — tap to add":`${otherC.done}/${otherC.total} done`}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                {otherC.total>0&&<div style={{width:48,height:4,background:"#F2F2F7",borderRadius:99,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${Math.round(otherC.done/otherC.total*100)}%`,background:OTHER_ACCENT,borderRadius:99}}/>
                </div>}
                <span style={{color:"#C7C7CC",fontSize:18}}>›</span>
              </div>
            </button>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              <PersonButton person="e" count={pendingECount} onClick={()=>setPersonView("e")}/>
              <PersonButton person="c" count={pendingCCount} onClick={()=>setPersonView("c")}/>
            </div>

            <div style={{background:"#fff",borderRadius:20,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.08)",marginBottom:16}}>
              {weekDays.map((d,idx)=>{
                const cc=CAT_COLOR[d.cat]||"#8E8E93";
                const c=dayCounts(d,checked,overrides,deleted,custom);
                const dn=c.total>0&&c.done===c.total;
                const hasNote=(notes[d.day]||"").trim().length>0;
                return(
                  <div key={d.day}>
                    {idx>0&&<div style={{height:1,background:"#F2F2F7",marginLeft:60}}/>}
                    <div onClick={()=>setActiveDay(d)} style={{display:"flex",alignItems:"center",padding:"14px 16px",cursor:"pointer",gap:14,background:dn?`${cc}08`:"transparent"}}>
                      <div style={{width:36,height:36,borderRadius:"50%",background:dn?cc:`${cc}15`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        <span style={{fontSize:13,fontWeight:700,color:dn?"#fff":cc}}>{dn?"✓":d.day}</span>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:15,fontWeight:600,color:dn?"#8E8E93":"#1C1C1E",marginBottom:3,textDecoration:dn?"line-through":"none"}}>{d.title}{hasNote&&<span style={{marginLeft:6,fontSize:12}} title="Has notes">📝</span>}</div>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:11,fontWeight:600,color:cc,background:`${cc}15`,padding:"2px 7px",borderRadius:99}}>{d.cat}</span>
                          <span style={{fontSize:11,color:"#8E8E93"}}>{c.done}/{c.total}</span>
                        </div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                        <div style={{width:36,height:4,background:"#F2F2F7",borderRadius:99,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${c.total?Math.round(c.done/c.total*100):0}%`,background:cc,borderRadius:99}}/>
                        </div>
                        <span style={{color:"#C7C7CC",fontSize:18}}>›</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{background:"#1C1C1E",borderRadius:20,padding:"16px 18px",marginBottom:16}}>
              <div style={{fontSize:12,fontWeight:700,color:"#8E8E93",letterSpacing:0.5,textTransform:"uppercase",marginBottom:12}}>Daily Non-Negotiables</div>
              {DAILY.map((t,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:i<DAILY.length-1?10:0}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:W.accent,flexShrink:0}}/>
                  <span style={{fontSize:14,color:"#EBEBF5"}}>{t}</span>
                </div>
              ))}
            </div>
            <FooterBar
              syncStatus={syncStatus} syncCode={syncCode}
              device={device}
              accent={W.accent}
              onSyncClick={()=>setSyncOpen(true)}
              onDeviceClick={()=>setShowDeviceSetup(true)}/>
          </>
        }
      </div>

      {menuTask&&<TaskActionSheet
        task={menuTask.taskObj}
        dayObj={menuTask.dayObj}
        isOther={menuTask.isOther}
        assignedE={assignedE[menuTask.taskObj.key]}
        assignedC={assignedC[menuTask.taskObj.key]}
        onEdit={()=>{setEditingKey(menuTask.taskObj.key);setMenuTask(null);}}
        onAssignE={()=>{toggleAssignE(menuTask.taskObj.key);setMenuTask(null);}}
        onAssignC={()=>{toggleAssignC(menuTask.taskObj.key);setMenuTask(null);}}
        onPing={()=>{sendPing(menuTask.taskObj, menuTask.dayObj);setMenuTask(null);}}
        onDelete={()=>{
          const dn = menuTask.dayObj ? menuTask.dayObj.day : null;
          if(confirm(`Delete "${menuTask.taskObj.text}"?`)){
            deleteTask(menuTask.taskObj, dn);
            setMenuTask(null);
          }
        }}
        onClose={()=>setMenuTask(null)}/>}

      {showDeviceSetup&&<DeviceSetupSheet
        currentPerson={device.person}
        hasToken={!!device.token}
        busy={pushBusy}
        onPick={completeDeviceSetup}
        onClose={()=>setShowDeviceSetup(false)}/>}

      {personView&&<PersonTasksSheet
        person={personView}
        currentWeek={week}
        checked={checked} custom={custom}
        otherTasks={otherTasks}
        overrides={overrides} deleted={deleted}
        assignedE={assignedE} assignedC={assignedC}
        onToggle={toggle}
        onPing={sendPing}
        onOpenDay={(d)=>{setPersonView(null);setActiveDay(d);}}
        onOpenOther={()=>{setPersonView(null);setActiveOther(true);}}
        onClose={()=>setPersonView(null)}/>}

      {syncOpen&&<SyncModal
        currentCode={syncCode} status={syncStatus} accent={W.accent}
        onActivate={activateSync} onDisconnect={disconnectSync}
        onClose={()=>setSyncOpen(false)} showToast={showToast}/>}
    </div>
  );
}

/* ---------- PingButton ---------- */
function PingButton({assignedE,assignedC,onPing,size=28}){
  if(!assignedE && !assignedC) return null;
  const color = assignedE && assignedC ? "#1C1C1E" : (assignedE ? ASSIGN_E.text : ASSIGN_C.text);
  const bg = assignedE && assignedC ? "#F2F2F7" : (assignedE ? ASSIGN_E.bg : ASSIGN_C.bg);
  return (
    <button onClick={(e)=>{e.stopPropagation();onPing();}} aria-label="Send ping" title="Send ping"
      style={{background:bg,border:"none",width:size,height:size,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",color,cursor:"pointer",flexShrink:0,padding:0}}>
      <SendIcon size={Math.round(size*0.5)}/>
    </button>
  );
}

/* ---------- Person tasks sheet ---------- */
function PersonTasksSheet({person,currentWeek,checked,custom,otherTasks,overrides,deleted,assignedE,assignedC,onToggle,onPing,onOpenDay,onOpenOther,onClose}){
  const t = personTheme(person);
  const {sheetRef, handleRef} = useSwipeDownDismiss(onClose);
  const [showCompleted, setShowCompleted] = useState(false);
  const days = DAYS;
  const assignedMap = person==="e" ? assignedE : assignedC;

  // Day-grouped tasks
  const groupedAll = days.map(d=>{
    const tasks = effectiveTasks(d,overrides,deleted,custom).filter(t=>assignedMap[t.key]);
    return {day:d, tasks};
  }).filter(g=>g.tasks.length>0);

  // When hiding completed, filter each day's tasks to active only and drop empty days
  const grouped = showCompleted
    ? groupedAll
    : groupedAll
        .map(g=>({day:g.day, tasks:g.tasks.filter(t=>!checked[t.key])}))
        .filter(g=>g.tasks.length>0);

  // Other tasks assigned to this person — split active / completed
  const otherAssigned = otherEffectiveTasks(otherTasks).filter(t=>assignedMap[t.key]);
  const otherActive = otherAssigned.filter(t=>!checked[t.key]);
  const otherCompleted = otherAssigned.filter(t=>checked[t.key]);
  const otherShown = showCompleted ? otherAssigned : otherActive;

  const dayTotalCount  = groupedAll.reduce((a,g)=>a+g.tasks.length,0);
  const dayDoneCount   = groupedAll.reduce((a,g)=>a+g.tasks.filter(t=>checked[t.key]).length,0);
  const otherDoneCount = otherCompleted.length;
  const totalCount = dayTotalCount + otherAssigned.length;
  const doneCount  = dayDoneCount + otherDoneCount;
  const completedCount = doneCount; // for the toggle label
  const allDone = totalCount>0 && doneCount===totalCount;

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:1000,display:"flex",alignItems:"flex-end"}}>
      <div ref={sheetRef} onClick={e=>e.stopPropagation()} style={{background:"#F2F2F7",width:"100%",maxWidth:430,margin:"0 auto",borderTopLeftRadius:24,borderTopRightRadius:24,padding:"10px 0 0",maxHeight:"92vh",display:"flex",flexDirection:"column",willChange:"transform"}}>
        <div ref={handleRef} style={{padding:"10px 20px 14px",cursor:"grab",touchAction:"none",flexShrink:0}}>
          <div style={{width:40,height:5,background:"#D1D1D6",borderRadius:99,margin:"0 auto 14px"}}/>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
            <div style={{width:42,height:42,borderRadius:"50%",background:t.solid,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:700,flexShrink:0}}>{t.initial}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:18,fontWeight:700,color:"#1C1C1E",letterSpacing:-0.3}}>{t.name}'s Tasks</div>
              <div style={{fontSize:12,color:"#8E8E93",marginTop:1}}>{doneCount}/{totalCount} done · all 30 days</div>
            </div>
            <button onClick={(e)=>{e.stopPropagation();onClose();}} style={{background:"#E5E5EA",border:"none",borderRadius:"50%",width:30,height:30,fontSize:16,color:"#8E8E93",cursor:"pointer",flexShrink:0,fontWeight:600,lineHeight:1}}>×</button>
          </div>
          {(grouped.length>0 || otherAssigned.length>0) && (
            <button onClick={(e)=>{e.stopPropagation();sharePersonTasks(t, grouped, otherAssigned, checked);}}
              style={{width:"100%",background:t.bg,border:`1px solid ${t.border}`,borderRadius:12,padding:"10px 14px",fontSize:13,fontWeight:600,color:t.text,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <SendIcon size={14}/> Share {t.name}'s task list
            </button>
          )}
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"4px 16px 24px"}}>
          {grouped.length===0 && otherAssigned.length===0
            ? <div style={{padding:"30px 20px",textAlign:"center",color:"#8E8E93",fontSize:14}}>
                No tasks assigned to {t.name} yet.
                <div style={{fontSize:12,marginTop:8,lineHeight:1.5}}>Long-press any task to assign it.</div>
              </div>
            : <>
              {grouped.map(g=>{
                const cc=CAT_COLOR[g.day.cat]||"#8E8E93";
                return (
                  <div key={g.day.day} style={{background:"#fff",borderRadius:14,marginBottom:10,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
                    <button onClick={()=>onOpenDay(g.day)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"transparent",border:"none",cursor:"pointer",width:"100%",borderBottom:"1px solid #F2F2F7",textAlign:"left"}}>
                      <div style={{width:26,height:26,borderRadius:"50%",background:`${cc}15`,color:cc,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>{g.day.day}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:600,color:"#1C1C1E"}}>{g.day.title}</div>
                        <div style={{fontSize:11,color:cc,fontWeight:600,marginTop:1}}>{g.day.cat}</div>
                      </div>
                      <span style={{color:"#C7C7CC",fontSize:16}}>›</span>
                    </button>
                    {g.tasks.map((task,i)=>{
                      const isDone = checked[task.key];
                      return (
                        <div key={task.key} onClick={()=>onToggle(task.key)} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",cursor:"pointer",background:isDone?`${cc}08`:"transparent",borderBottom:i<g.tasks.length-1?"1px solid #F2F2F7":"none"}}>
                          <div style={{width:22,height:22,borderRadius:"50%",flexShrink:0,border:`2px solid ${isDone?cc:"#D1D1D6"}`,background:isDone?cc:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                            {isDone&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>}
                          </div>
                          <span style={{fontSize:14,color:isDone?"#8E8E93":"#1C1C1E",lineHeight:1.4,textDecoration:isDone?"line-through":"none",flex:1}}>{task.text}</span>
                          <PingButton assignedE={assignedE[task.key]} assignedC={assignedC[task.key]} onPing={()=>onPing(task,g.day)} size={26}/>
                        </div>
                      );
                    })}
                  </div>
                );
              })}

              {otherShown.length>0&&(
                <div style={{background:"#fff",borderRadius:14,marginBottom:10,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
                  <button onClick={onOpenOther} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"transparent",border:"none",cursor:"pointer",width:"100%",borderBottom:"1px solid #F2F2F7",textAlign:"left"}}>
                    <div style={{width:26,height:26,borderRadius:"50%",background:`${OTHER_ACCENT}18`,color:OTHER_ACCENT,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0}}>+</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,color:"#1C1C1E"}}>Other Tasks</div>
                      <div style={{fontSize:11,color:OTHER_ACCENT,fontWeight:600,marginTop:1}}>Not tied to a specific day</div>
                    </div>
                    <span style={{color:"#C7C7CC",fontSize:16}}>›</span>
                  </button>
                  {otherShown.map((task,i)=>{
                    const isDone = checked[task.key];
                    return (
                      <div key={task.key} onClick={()=>onToggle(task.key)} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",cursor:"pointer",background:isDone?`${OTHER_ACCENT}08`:"transparent",borderBottom:i<otherShown.length-1?"1px solid #F2F2F7":"none"}}>
                        <div style={{width:22,height:22,borderRadius:"50%",flexShrink:0,border:`2px solid ${isDone?OTHER_ACCENT:"#D1D1D6"}`,background:isDone?OTHER_ACCENT:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                          {isDone&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>}
                        </div>
                        <span style={{fontSize:14,color:isDone?"#8E8E93":"#1C1C1E",lineHeight:1.4,textDecoration:isDone?"line-through":"none",flex:1}}>{task.text}</span>
                        <PingButton assignedE={assignedE[task.key]} assignedC={assignedC[task.key]} onPing={()=>onPing(task,null)} size={26}/>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* All-caught-up empty state when everything's done and we're hiding completed */}
              {!showCompleted && totalCount>0 && grouped.length===0 && otherShown.length===0 && (
                <div style={{background:"#fff",borderRadius:14,padding:"30px 20px",textAlign:"center",marginBottom:10,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
                  <div style={{fontSize:28,marginBottom:8}}>🎉</div>
                  <div style={{fontSize:15,fontWeight:600,color:"#1C1C1E"}}>All caught up!</div>
                  <div style={{fontSize:12,color:"#8E8E93",marginTop:4}}>Every task assigned to {t.name} is done.</div>
                </div>
              )}

              {/* Global Show/Hide completed toggle */}
              {completedCount>0 && (
                <div style={{padding:"4px 4px 18px",textAlign:"center"}}>
                  <button onClick={()=>setShowCompleted(!showCompleted)}
                    style={{background:"none",border:"none",color:t.text,fontSize:13,fontWeight:600,cursor:"pointer",padding:"8px 14px"}}>
                    {showCompleted ? `× Hide ${completedCount} completed` : `↓ Show ${completedCount} completed`}
                  </button>
                </div>
              )}
            </>
          }
        </div>
      </div>
    </div>
  );
}

  );
}

        <div style={{height:4}}/>
        {isSynced&&(
          <div style={{background:`${accent}10`,border:`1px solid ${accent}30`,borderRadius:14,padding:"14px 16px",marginBottom:16}}>

          <button onClick={()=>setInput(newSyncCode())} style={{background:"#F2F2F7",color:"#1C1C1E",border:"none",borderRadius:12,padding:"0 14px",fontSize:13,fontWeight:600,cursor:"pointer",flexShrink:0}}>Generate</button>

        <button onClick={()=>onActivate(input)} disabled={input.trim().length<6} style={{width:"100%",background:input.trim().length>=6?accent:"#E5E5EA",color:"#fff",border:"none",borderRadius:12,padding:"13px",fontSize:15,fontWeight:600,cursor:input.trim().length>=6?"pointer":"default",marginBottom:isSynced?10:16}}>{isSynced?"Switch code":"Connect"}</button>
        {isSynced&&<button onClick={onDisconnect} style={{width:"100%",background:"#fff",color:"#FF3B30",border:"1px solid #FFD7D5",borderRadius:12,padding:"12px",fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:10}}>Stop syncing on this device</button>}
        <button onClick={onClose} style={{width:"100%",background:"none",color:"#8E8E93",border:"none",padding:"10px",fontSize:14,fontWeight:600,cursor:"pointer"}}>Close</button>
      </div>
    </div>
  );
}

/* ---------- TaskRow ---------- */
function TaskRow({task, dayNum, isDone, isEditing, assignedE, assignedC, cc, onToggle, onLongPress, onPing, onEditSave, onEditCancel}){
  const [editText, setEditText] = useState(task.text);
  useEffect(()=>{setEditText(task.text);},[task.text,isEditing]);
  const pressRef = useRef({timer:null,triggered:false,startX:0,startY:0});

  const start = (e) => {
    pressRef.current.triggered=false;
    const t = e.touches?.[0] || e;
    pressRef.current.startX = t?.clientX||0;
    pressRef.current.startY = t?.clientY||0;
    pressRef.current.timer = setTimeout(()=>{
      pressRef.current.triggered=true;
      try{navigator.vibrate&&navigator.vibrate(40);}catch{};
      onLongPress();
    },500);
  };
  const cancel = ()=>{if(pressRef.current.timer){clearTimeout(pressRef.current.timer);pressRef.current.timer=null;}};
  const move = (e) => {
    if(!pressRef.current.timer) return;
    const t = e.touches?.[0] || e;
    if(Math.abs(t.clientX-pressRef.current.startX)>10 || Math.abs(t.clientY-pressRef.current.startY)>10) cancel();
  };
  const click = ()=>{if(pressRef.current.triggered){pressRef.current.triggered=false;return;} onToggle();};
  const ctx = (e)=>{e.preventDefault();cancel();pressRef.current.triggered=true;onLongPress();};

  if(isEditing){
    return (
      <div style={{padding:"12px 16px",background:"#FFFBEB",borderBottom:"1px solid #F2F2F7"}}>
        <textarea autoFocus value={editText} onChange={e=>setEditText(e.target.value)}
          style={{width:"100%",border:"1px solid #E5E5EA",borderRadius:10,padding:"10px 12px",fontSize:15,minHeight:64,resize:"vertical",background:"#fff",color:"#1C1C1E",lineHeight:1.4}}/>
        <div style={{display:"flex",gap:8,marginTop:8,justifyContent:"flex-end"}}>
          <button onClick={onEditCancel} style={{background:"#F2F2F7",border:"none",borderRadius:8,padding:"7px 16px",fontSize:13,fontWeight:600,color:"#1C1C1E",cursor:"pointer"}}>Cancel</button>
          <button onClick={()=>onEditSave(editText)} style={{background:cc,color:"#fff",border:"none",borderRadius:8,padding:"7px 16px",fontSize:13,fontWeight:600,cursor:"pointer"}}>Save</button>
        </div>
      </div>
    );
  }

  return (
    <div
      onClick={click}
      onTouchStart={start} onTouchEnd={cancel} onTouchMove={move} onTouchCancel={cancel}
      onMouseDown={start} onMouseUp={cancel} onMouseLeave={cancel}
      onContextMenu={ctx}
      style={{display:"flex",alignItems:"center",gap:10,padding:"14px 16px",cursor:"pointer",background:isDone?`${cc}08`:(task.builtin?"transparent":"#FAFAFA"),borderBottom:"1px solid #F2F2F7",userSelect:"none",WebkitUserSelect:"none",WebkitTouchCallout:"none"}}>
      <div style={{width:26,height:26,borderRadius:"50%",flexShrink:0,border:`2px solid ${isDone?cc:"#D1D1D6"}`,background:isDone?cc:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
        {isDone&&<span style={{color:"#fff",fontSize:13,lineHeight:1,fontWeight:700}}>✓</span>}
      </div>
      <span style={{fontSize:15,color:isDone?"#8E8E93":"#1C1C1E",lineHeight:1.45,textDecoration:isDone?"line-through":"none",flex:1,minWidth:0,wordBreak:"break-word"}}>{task.text}</span>
      <div style={{display:"flex",gap:4,flexShrink:0,marginLeft:4,alignItems:"center"}}>
        {assignedE&&<PersonDot p="e"/>}
        {assignedC&&<PersonDot p="c"/>}
        <PingButton assignedE={assignedE} assignedC={assignedC} onPing={onPing}/>
      </div>
    </div>
  );
}

/* ---------- DayDetail ---------- */
function DayDetail({d,checked,custom,overrides,deleted,assignedE,assignedC,note,editingKey,onToggle,onPing,onLongPress,onAddCustom,onNoteChange,onEditSave,onEditCancel,onRestoreDeleted,onBack}){
  const cc=CAT_COLOR[d.cat]||"#8E8E93";
  const [newTask,setNewTask]=useState("");
  const tasks = effectiveTasks(d, overrides, deleted, custom);
  const done = tasks.filter(t=>checked[t.key]).length;
  const total = tasks.length;
  const pct = total?Math.round(done/total*100):0;
  const allDone = total>0 && done===total;
  const deletedCount = Object.keys(deleted).filter(k=>k.startsWith(`${d.day}-`) && !k.includes("-c")).length;

  const submit=()=>{const t=newTask.trim();if(!t)return;onAddCustom(t);setNewTask("");};

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:cc,cursor:"pointer",fontSize:16,fontWeight:600,padding:0,display:"flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:22}}>‹</span> Back
        </button>
        <div style={{fontSize:11,color:"#8E8E93",fontWeight:500}}>Long-press for options · Tap ➤ to ping</div>
      </div>
      <div style={{background:"#fff",borderRadius:20,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,0.08)",marginBottom:16}}>
        <div style={{height:5,background:allDone?cc:`${cc}40`}}/>
        <div style={{padding:"18px 20px 14px",borderBottom:"1px solid #F2F2F7"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
            <div>
              <div style={{fontSize:11,fontWeight:600,color:"#8E8E93",textTransform:"uppercase",letterSpacing:0.5,marginBottom:3}}>Day {d.day}</div>
              <div style={{fontSize:20,fontWeight:700,color:"#1C1C1E",letterSpacing:-0.4,lineHeight:1.2}}>{d.title}</div>
            </div>
            <span style={{fontSize:12,fontWeight:600,color:cc,background:`${cc}15`,padding:"4px 10px",borderRadius:99,flexShrink:0,marginLeft:10}}>{d.cat}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontSize:12,color:"#8E8E93"}}>{done} of {total} tasks</span>
            <span style={{fontSize:12,fontWeight:700,color:allDone?cc:"#8E8E93"}}>{pct}%{allDone?" ✓":""}</span>
          </div>
          <div style={{height:5,background:"#F2F2F7",borderRadius:99,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:cc,borderRadius:99,transition:"width 0.3s"}}/>
          </div>
        </div>

        <div style={{padding:"4px 0"}}>
          {tasks.filter(t=>t.builtin).map(t=>(
            <TaskRow key={t.key} task={t} dayNum={d.day} isDone={checked[t.key]} isEditing={editingKey===t.key}
              assignedE={assignedE[t.key]} assignedC={assignedC[t.key]} cc={cc}
              onToggle={()=>onToggle(t.key)}
              onPing={()=>onPing(t, d)}
              onLongPress={()=>onLongPress(t)}
              onEditSave={text=>onEditSave(t,text)}
              onEditCancel={onEditCancel}/>
          ))}
          {tasks.filter(t=>!t.builtin).length>0&&(
            <div style={{padding:"12px 20px 6px",fontSize:11,fontWeight:700,color:"#8E8E93",textTransform:"uppercase",letterSpacing:0.5,background:"#FAFAFA"}}>Your tasks</div>
          )}
          {tasks.filter(t=>!t.builtin).map(t=>(
            <TaskRow key={t.key} task={t} dayNum={d.day} isDone={checked[t.key]} isEditing={editingKey===t.key}
              assignedE={assignedE[t.key]} assignedC={assignedC[t.key]} cc={cc}
              onToggle={()=>onToggle(t.key)}
              onPing={()=>onPing(t, d)}
              onLongPress={()=>onLongPress(t)}
              onEditSave={text=>onEditSave(t,text)}
              onEditCancel={onEditCancel}/>
          ))}

          <div style={{display:"flex",gap:8,padding:"12px 16px 12px"}}>
            <input type="text" value={newTask} onChange={e=>setNewTask(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter")submit();}}
              placeholder="Add your own task…"
              style={{flex:1,border:"1px solid #E5E5EA",borderRadius:12,padding:"10px 14px",fontSize:15,background:"#fff",color:"#1C1C1E",minWidth:0}}/>
            <button onClick={submit} disabled={!newTask.trim()} style={{background:newTask.trim()?cc:"#E5E5EA",color:"#fff",border:"none",borderRadius:12,padding:"0 16px",fontSize:14,fontWeight:600,cursor:newTask.trim()?"pointer":"default",flexShrink:0}}>Add</button>
          </div>

          {deletedCount>0&&(
            <div style={{padding:"6px 20px 14px"}}>
              <button onClick={()=>{if(confirm(`Restore ${deletedCount} deleted task(s)?`))onRestoreDeleted();}}
                style={{background:"none",border:"none",color:cc,fontSize:13,fontWeight:600,cursor:"pointer",padding:0}}>
                ↺ Restore {deletedCount} deleted task{deletedCount===1?"":"s"}
              </button>
            </div>
          )}
        </div>

        {allDone&&(
          <div style={{margin:"0 16px 16px",background:`${cc}15`,borderRadius:14,padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>🎉</span>
            <span style={{fontSize:14,fontWeight:600,color:cc}}>Day {d.day} complete!</span>
          </div>
        )}
      </div>

      <div style={{background:"#fff",borderRadius:20,padding:"16px 18px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)",marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div style={{fontSize:12,fontWeight:700,color:"#8E8E93",letterSpacing:0.5,textTransform:"uppercase"}}>Notes</div>
          {note&&<span style={{fontSize:11,color:"#8E8E93"}}>{note.length} chars</span>}
        </div>
        <textarea value={note} onChange={e=>onNoteChange(e.target.value)}
          placeholder="What happened today? Results, lessons, follow-ups…"
          style={{width:"100%",minHeight:120,border:"1px solid #E5E5EA",borderRadius:12,padding:"12px 14px",fontSize:15,lineHeight:1.5,color:"#1C1C1E",background:"#FAFAFA",resize:"vertical"}}/>
      </div>
    </div>
  );
}

/* ---------- OtherTasksDetail ---------- */
function OtherTasksDetail({tasks,checked,assignedE,assignedC,editingKey,onToggle,onPing,onLongPress,onAdd,onEditSave,onEditCancel,onBack}){
  const cc = OTHER_ACCENT;
  const [newTask,setNewTask]=useState("");
  const [showCompleted, setShowCompleted] = useState(false);

  const activeTasks = tasks.filter(t=>!checked[t.key]);
  const completedTasks = tasks.filter(t=>checked[t.key]);
  const done = completedTasks.length;
  const total = tasks.length;
  const pct = total?Math.round(done/total*100):0;
  const allDone = total>0 && done===total;
  const submit=()=>{const t=newTask.trim();if(!t)return;onAdd(t);setNewTask("");};

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:cc,cursor:"pointer",fontSize:16,fontWeight:600,padding:0,display:"flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:22}}>‹</span> Back
        </button>
        <div style={{fontSize:11,color:"#8E8E93",fontWeight:500}}>Long-press for options · Tap ➤ to ping</div>
      </div>
      <div style={{background:"#fff",borderRadius:20,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,0.08)",marginBottom:16}}>
        <div style={{height:5,background:allDone?cc:`${cc}40`}}/>
        <div style={{padding:"18px 20px 14px",borderBottom:"1px solid #F2F2F7"}}>
          <div style={{fontSize:11,fontWeight:600,color:"#8E8E93",textTransform:"uppercase",letterSpacing:0.5,marginBottom:3}}>Section</div>
          <div style={{fontSize:20,fontWeight:700,color:"#1C1C1E",letterSpacing:-0.4,lineHeight:1.2,marginBottom:10}}>Other Tasks</div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontSize:12,color:"#8E8E93"}}>{done} of {total} {total===1?"task":"tasks"} done</span>
            <span style={{fontSize:12,fontWeight:700,color:allDone?cc:"#8E8E93"}}>{total?pct:0}%{allDone?" ✓":""}</span>
          </div>
          <div style={{height:5,background:"#F2F2F7",borderRadius:99,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${total?pct:0}%`,background:cc,borderRadius:99,transition:"width 0.3s"}}/>
          </div>
        </div>

        <div style={{padding:"4px 0"}}>
          {tasks.length===0&&(
            <div style={{padding:"24px 20px",textAlign:"center",color:"#8E8E93",fontSize:13,lineHeight:1.5}}>No tasks yet. Add one below.</div>
          )}
          {tasks.length>0 && activeTasks.length===0 && (
            <div style={{padding:"24px 20px",textAlign:"center",color:cc,fontSize:14,fontWeight:600,lineHeight:1.5}}>
              🎉 All caught up!
              <div style={{fontSize:12,fontWeight:500,color:"#8E8E93",marginTop:4}}>Add another task or tap below to see what's done.</div>
            </div>
          )}
          {activeTasks.map(t=>(
            <TaskRow key={t.key} task={t} dayNum={null} isDone={false} isEditing={editingKey===t.key}
              assignedE={assignedE[t.key]} assignedC={assignedC[t.key]} cc={cc}
              onToggle={()=>onToggle(t.key)}
              onPing={()=>onPing(t, null)}
              onLongPress={()=>onLongPress(t)}
              onEditSave={text=>onEditSave(t,text)}
              onEditCancel={onEditCancel}/>
          ))}

          <div style={{display:"flex",gap:8,padding:"12px 16px 12px"}}>
            <input type="text" value={newTask} onChange={e=>setNewTask(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter")submit();}}
              placeholder="Add a task…"
              style={{flex:1,border:"1px solid #E5E5EA",borderRadius:12,padding:"10px 14px",fontSize:15,background:"#fff",color:"#1C1C1E",minWidth:0}}/>
            <button onClick={submit} disabled={!newTask.trim()} style={{background:newTask.trim()?cc:"#E5E5EA",color:"#fff",border:"none",borderRadius:12,padding:"0 16px",fontSize:14,fontWeight:600,cursor:newTask.trim()?"pointer":"default",flexShrink:0}}>Add</button>
          </div>

          {completedTasks.length>0 && (
            <div style={{padding:"6px 20px 14px"}}>
              <button onClick={()=>setShowCompleted(!showCompleted)}
                style={{background:"none",border:"none",color:cc,fontSize:13,fontWeight:600,cursor:"pointer",padding:0}}>
                {showCompleted ? "× Hide" : "↓ Show"} {completedTasks.length} completed
              </button>
            </div>
          )}

          {showCompleted && completedTasks.length>0 && (
            <>
              <div style={{padding:"12px 20px 6px",fontSize:11,fontWeight:700,color:"#8E8E93",letterSpacing:0.5,textTransform:"uppercase",background:"#FAFAFA"}}>Completed · tap to reactivate</div>
              {completedTasks.map(t=>(
                <TaskRow key={t.key} task={t} dayNum={null} isDone={true} isEditing={editingKey===t.key}
                  assignedE={assignedE[t.key]} assignedC={assignedC[t.key]} cc={cc}
                  onToggle={()=>onToggle(t.key)}
                  onPing={()=>onPing(t, null)}
                  onLongPress={()=>onLongPress(t)}
                  onEditSave={text=>onEditSave(t,text)}
                  onEditCancel={onEditCancel}/>
              ))}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
